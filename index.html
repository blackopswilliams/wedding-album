<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Josh & Grace · Photo Album</title>

<!--
  ============================================================
  SHARED WEDDING PHOTO ALBUM  ·  one-time setup
  ============================================================
  1. In Supabase: Storage -> New bucket -> name it exactly:  wedding-album
     Turn ON "Public bucket", then Save.
  2. In Supabase: SQL Editor -> run the script at the very
     bottom of this file (creates the photo list + permissions).
  3. Your project URL and publishable key are already filled in
     the CONFIG block below. Edit COUPLE_NAME if you like.
  Then host this file (e.g. drag onto app.netlify.com/drop, or
  add to your GitHub Pages repo) and share the link.
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500&family=Hanken+Grotesk:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#EFE9DF;
    --paper:#F6F2EA;
    --ink:#36322C;
    --mute:#7A7266;
    --line:#DAD2C4;
    --shadow:0 14px 34px -18px rgba(54,50,44,.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Cormorant Garamond", Georgia, serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  /* ---------- header ---------- */
  header{ text-align:center; padding:clamp(34px,6vw,64px) 20px 10px; }
  .script{
    font-family:"Great Vibes", cursive;
    font-size:clamp(52px,11vw,92px);
    line-height:1; margin:0; font-weight:400;
  }
  .eyebrow{
    font-size:13px; letter-spacing:5px; text-transform:uppercase;
    color:var(--mute); margin:18px 0 0; font-family:"Hanken Grotesk",sans-serif;
  }
  .lede{ font-size:clamp(18px,2.4vw,21px); color:var(--mute); margin:12px auto 0; max-width:540px; }
  .rule{ width:64px; height:1px; background:var(--line); margin:26px auto 0; }

  /* ---------- uploader ---------- */
  .wrap{ max-width:1120px; margin:0 auto; padding:0 18px 80px; }
  .uploader{
    background:var(--paper); border:1px solid var(--line); border-radius:16px;
    box-shadow:var(--shadow); padding:clamp(22px,4vw,34px);
    max-width:620px; margin:30px auto 0;
  }
  .drop{
    border:1.5px dashed var(--line); border-radius:12px; padding:30px 18px; text-align:center;
    cursor:pointer; transition:border-color .18s, background .18s;
  }
  .drop:hover, .drop.over{ border-color:var(--mute); background:#FBF8F2; }
  .drop .big{ font-family:"Great Vibes",cursive; font-size:34px; line-height:1; }
  .drop .sub{ color:var(--mute); font-size:16px; margin-top:8px; font-family:"Hanken Grotesk",sans-serif; }
  input[type=file]{ display:none; }

  .meta{ display:grid; grid-template-columns:1fr; gap:12px; margin-top:18px; }
  input[type=text]{
    width:100%; font-family:"Cormorant Garamond",serif; font-size:19px; color:var(--ink);
    background:#FFFDF8; border:1px solid var(--line); border-radius:10px; padding:11px 14px;
  }
  input[type=text]:focus{ outline:none; border-color:var(--mute); }
  input::placeholder{ color:#B3AB9C; }

  .queue{ display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
  .thumb{ position:relative; width:74px; height:74px; border-radius:9px; overflow:hidden; border:1px solid var(--line); }
  .thumb img{ width:100%; height:100%; object-fit:cover; }
  .thumb .x{ position:absolute; top:2px; right:2px; width:20px; height:20px; border:none; border-radius:50%;
    background:rgba(54,50,44,.7); color:#fff; cursor:pointer; font-size:13px; line-height:20px; padding:0; }

  .send{
    margin-top:20px; width:100%; border:none; cursor:pointer;
    background:var(--ink); color:var(--cream); font-family:"Hanken Grotesk",sans-serif;
    font-size:15px; letter-spacing:1px; padding:15px; border-radius:11px;
    transition:opacity .18s, transform .12s;
  }
  .send:hover{ transform:translateY(-1px); }
  .send:disabled{ opacity:.5; cursor:default; transform:none; }
  .status{ text-align:center; color:var(--mute); font-size:15px; margin-top:12px; min-height:20px;
    font-family:"Hanken Grotesk",sans-serif; }

  .banner{ max-width:620px; margin:24px auto 0; background:#F3ECD9; border:1px solid var(--line);
    border-radius:10px; padding:11px 16px; text-align:center; color:var(--mute); font-size:15px;
    font-family:"Hanken Grotesk",sans-serif; }
  .banner b{ color:var(--ink); }

  /* ---------- gallery ---------- */
  .gallery-head{ text-align:center; margin:64px 0 22px; }
  .gallery-head h2{ font-family:"Great Vibes",cursive; font-weight:400; font-size:clamp(34px,5vw,48px); margin:0; }
  .gallery-head .count{ color:var(--mute); font-size:15px; letter-spacing:1px; margin-top:6px;
    font-family:"Hanken Grotesk",sans-serif; }

  .grid{ columns:4 240px; column-gap:14px; }
  .tile{ break-inside:avoid; margin-bottom:14px; border-radius:12px; overflow:hidden;
    background:var(--paper); box-shadow:var(--shadow); cursor:zoom-in; position:relative; }
  .tile img{ width:100%; display:block; }
  .tile .cap{ padding:10px 12px; }
  .tile .cap .who{ font-size:17px; }
  .tile .cap .note{ color:var(--mute); font-size:15px; }
  .empty{ text-align:center; color:var(--mute); padding:50px 0; font-size:18px; }

  /* ---------- lightbox ---------- */
  .lb{ position:fixed; inset:0; background:rgba(30,27,23,.92); display:none; align-items:center;
    justify-content:center; z-index:50; padding:24px; cursor:zoom-out; }
  .lb.open{ display:flex; }
  .lb img{ max-width:94vw; max-height:88vh; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .lb .cap{ position:absolute; bottom:22px; left:0; right:0; text-align:center; color:#EFE9DF; font-size:18px; }

  @media (max-width:560px){ .grid{ columns:2 150px; } }
</style>
</head>
<body>

  <header>
    <h1 class="script" id="couple">Josh &amp; Grace</h1>
    <p class="eyebrow">The Wedding Album</p>
    <p class="lede">Share your photos from our celebration — every picture you add appears below for everyone to enjoy.</p>
    <div class="rule"></div>
  </header>

  <div class="wrap">
    <div class="banner" id="banner" style="display:none;"></div>

    <section class="uploader">
      <label class="drop" id="drop">
        <input type="file" id="file" accept="image/*" multiple />
        <div class="big">Add your photos</div>
        <div class="sub">Tap to choose, or drag pictures here</div>
      </label>

      <div class="queue" id="queue"></div>

      <div class="meta">
        <input type="text" id="name" placeholder="Your name (optional)" />
        <input type="text" id="caption" placeholder="Add a caption (optional)" />
      </div>

      <button class="send" id="send" disabled>Add to the album</button>
      <div class="status" id="status"></div>
    </section>

    <div class="gallery-head">
      <h2>The Album</h2>
      <div class="count" id="count">Loading…</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">No photos yet — be the first to add one.</div>
  </div>

  <div class="lb" id="lb"><img id="lbimg" alt="" /><div class="cap" id="lbcap"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== CONFIG ===================== */
const SUPABASE_URL = "https://xqrtufabfsnvfbqfjmeu.supabase.co";
const SUPABASE_KEY = "sb_publishable_RaPxQmA-wDhqJJCqTtM5_w_W9c7LbRc";
const BUCKET       = "wedding-album";
const COUPLE_NAME  = "Josh & Grace";
/* ================================================== */

document.getElementById("couple").textContent = COUPLE_NAME;
document.title = COUPLE_NAME + " · Photo Album";

const LIVE = (typeof supabase !== "undefined") && SUPABASE_URL && !SUPABASE_URL.includes("YOUR_");
const sb = LIVE ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
let demo = []; // preview-mode store

if (!LIVE) {
  const b = document.getElementById("banner");
  b.style.display = "block";
  b.innerHTML = "<b>Preview mode.</b> Photos shown here are local only — host this file with your Supabase keys to go live.";
}

// ---------- file queue ----------
let queued = [];
const fileInput = document.getElementById("file");
const drop = document.getElementById("drop");
const queueEl = document.getElementById("queue");
const sendBtn = document.getElementById("send");
const statusEl = document.getElementById("status");

fileInput.addEventListener("change", e => addFiles(e.target.files));
["dragover","dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => addFiles(e.dataTransfer.files));

function addFiles(list){
  for (const f of list){ if (f.type.startsWith("image/")) queued.push(f); }
  renderQueue();
}
function renderQueue(){
  queueEl.innerHTML = "";
  queued.forEach((f, i) => {
    const d = document.createElement("div"); d.className = "thumb";
    const img = document.createElement("img"); img.src = URL.createObjectURL(f); d.appendChild(img);
    const x = document.createElement("button"); x.className = "x"; x.textContent = "×";
    x.onclick = () => { queued.splice(i,1); renderQueue(); };
    d.appendChild(x); queueEl.appendChild(d);
  });
  sendBtn.disabled = queued.length === 0;
  sendBtn.textContent = queued.length > 1 ? `Add ${queued.length} photos to the album` : "Add to the album";
}

// ---------- downscale before upload ----------
function processImage(file, maxDim=1800, quality=0.85){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (Math.max(width, height) > maxDim){
        const s = maxDim / Math.max(width, height); width = Math.round(width*s); height = Math.round(height*s);
      }
      const c = document.createElement("canvas"); c.width = width; c.height = height;
      c.getContext("2d").drawImage(img, 0, 0, width, height);
      c.toBlob(b => b ? resolve(b) : reject(new Error("encode failed")), "image/jpeg", quality);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

// ---------- upload ----------
sendBtn.addEventListener("click", upload);
async function upload(){
  if (!queued.length) return;
  const name = document.getElementById("name").value.trim() || null;
  const caption = document.getElementById("caption").value.trim() || null;
  sendBtn.disabled = true;
  const total = queued.length;

  try {
    for (let i = 0; i < total; i++){
      statusEl.textContent = `Uploading ${i+1} of ${total}…`;
      const blob = await processImage(queued[i]);
      if (LIVE){
        const path = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.jpg`;
        const up = await sb.storage.from(BUCKET).upload(path, blob, { contentType:"image/jpeg" });
        if (up.error) throw up.error;
        const { data:{ publicUrl } } = sb.storage.from(BUCKET).getPublicUrl(path);
        const ins = await sb.from("album_photos").insert({ url:publicUrl, path, uploader:name, caption });
        if (ins.error) throw ins.error;
      } else {
        demo.unshift({ url:URL.createObjectURL(blob), uploader:name, caption, created_at:new Date().toISOString() });
      }
    }
    statusEl.textContent = total > 1 ? "Thank you! Your photos are in the album." : "Thank you! Your photo is in the album.";
    queued = []; renderQueue();
    document.getElementById("name").value = ""; document.getElementById("caption").value = "";
    loadGallery();
  } catch (e){
    console.error(e);
    const msg = (e && (e.message || e.error || e.error_description)) || "unknown error";
    statusEl.textContent = "Upload failed: " + msg;
    sendBtn.disabled = false;
  }
}

// ---------- gallery ----------
const grid = document.getElementById("grid");
const countEl = document.getElementById("count");
const emptyEl = document.getElementById("empty");

async function loadGallery(){
  let rows = [];
  try {
    if (LIVE){
      const { data, error } = await sb.from("album_photos").select("*").order("created_at",{ascending:false});
      if (error) throw error; rows = data || [];
    } else { rows = demo; }
  } catch (e){ console.error(e); countEl.textContent = "Couldn't load the album."; return; }

  countEl.textContent = rows.length ? `${rows.length} photo${rows.length>1?"s":""} shared` : "";
  emptyEl.style.display = rows.length ? "none" : "block";
  grid.innerHTML = rows.map(r => {
    const cap = (r.uploader || r.caption)
      ? `<div class="cap">${r.uploader?`<div class="who">${esc(r.uploader)}</div>`:""}${r.caption?`<div class="note">${esc(r.caption)}</div>`:""}</div>` : "";
    return `<div class="tile" data-url="${r.url}" data-cap="${esc((r.uploader?r.uploader+(r.caption?" — ":""):"")+(r.caption||""))}">
      <img loading="lazy" src="${r.url}" alt="">${cap}</div>`;
  }).join("");
  grid.querySelectorAll(".tile").forEach(t => t.addEventListener("click", () => openLb(t.dataset.url, t.dataset.cap)));
}

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- lightbox ----------
const lb = document.getElementById("lb"), lbimg = document.getElementById("lbimg"), lbcap = document.getElementById("lbcap");
function openLb(url, cap){ lbimg.src = url; lbcap.textContent = cap || ""; lb.classList.add("open"); }
lb.addEventListener("click", () => lb.classList.remove("open"));

loadGallery();
</script>

<!--
  =================  album-setup.sql  =================
  After creating the PUBLIC bucket named  wedding-album , run this:

  -- 1) table that lists the photos
  create table public.album_photos (
    id uuid primary key default gen_random_uuid(),
    url text not null,
    path text not null,
    uploader text,
    caption text,
    created_at timestamptz not null default now()
  );
  alter table public.album_photos enable row level security;
  create policy "anyone can add a photo"
    on public.album_photos for insert to anon with check (true);
  create policy "anyone can view photos"
    on public.album_photos for select to anon using (true);

  -- 2) let anyone upload into / read the storage bucket
  create policy "anyone can upload to album"
    on storage.objects for insert to anon
    with check (bucket_id = 'wedding-album');
  create policy "anyone can view album files"
    on storage.objects for select to anon
    using (bucket_id = 'wedding-album');
  ====================================================
-->
</body>
</html>
